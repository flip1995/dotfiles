"$schema" = "https://jj-vcs.github.io/jj/latest/config-schema.json"
[user]
name = "Philipp Krones"
email = "hello@philkrones.com"

[signing]
behavior = "own"
backend = "gpg"
key = "1CA0DF2AF59D68A5"

[git]
sign-on-push = true

[ui]
merge-editor = "meld"
default-command = "log"

[snapshot]
auto-track = "none()"

[remotes.origin]
auto-track-created-bookmarks = "*"

[aliases]
tug = ["bookmark", "move", "--from", "heads(::@- & bookmarks())", "--to", "@"]
tug- = ["bookmark", "move", "--from", "heads(::@- & bookmarks())", "--to", "@-"]
untug = ["bookmark", "move", "--from", "heads(@+:: & bookmarks())", "--to", "@", "--allow-backwards"]

[[--scope]]
--when.repositories = ["~/recogni"]
[--scope.user]
email = "philipp.krones@tensordyne.ai"
